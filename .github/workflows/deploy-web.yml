name: Deploy Flutter Web to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'splitpal/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.2'
          channel: 'stable'
          cache: true

      - name: Create production .env
        run: |
          cat > splitpal/.env << 'ENVEOF'
          API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}
          GEMINI_API_KEY=${{ secrets.PRODUCTION_GEMINI_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' splitpal/.env

      - name: Install dependencies
        working-directory: splitpal
        run: flutter pub get

      - name: Build web
        working-directory: splitpal
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: comp1682-e98e2
          entryPoint: splitpal
