name: Build APK & Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.2'
          channel: 'stable'
          cache: true

      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > splitpal/android/app/release.jks

      - name: Create production .env
        run: |
          cat > splitpal/.env << 'ENVEOF'
          API_BASE_URL=${{ secrets.PRODUCTION_API_URL }}
          GEMINI_API_KEY=${{ secrets.PRODUCTION_GEMINI_KEY }}
          GOOGLE_WEB_CLIENT_ID=${{ secrets.PRODUCTION_GOOGLE_CLIENT_ID }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' splitpal/.env

      - name: Install dependencies
        working-directory: splitpal
        run: flutter pub get

      - name: Build APK
        working-directory: splitpal
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv splitpal/build/app/outputs/flutter-apk/app-release.apk splitpal/build/app/outputs/flutter-apk/SplitPal-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SplitPal ${{ github.ref_name }}"
          body: |
            ## SplitPal ${{ github.ref_name }}
            
            ### Cài đặt trên Android
            1. Tải file APK bên dưới
            2. Bật "Cài đặt từ nguồn không xác định" trong Settings
            3. Mở file APK để cài đặt
          files: splitpal/build/app/outputs/flutter-apk/SplitPal-*.apk
          draft: false
          prerelease: false
